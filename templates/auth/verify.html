{% extends "base.html" %}
{% block title %}Verify Email{% endblock %}

{% block content %}
<div class="zb-login-wrap">
  <div class="zb-login-box">
    <div style="font-size:2rem; margin-bottom:12px;">✉️</div>
    <h5 class="zb-login-title" style="font-size:1.4rem;">Check your inbox</h5>
    <p class="text-secondary mb-4" style="font-size:.87rem;">
      We sent a 6-digit code to <strong>{{ email }}</strong>
    </p>
    <form action="{{ url_for('auth.verify') }}" method="POST">
      <input type="text" class="zb-input text-center mb-4" name="code"
             placeholder="000000" maxlength="6" pattern="\d{6}"
             style="letter-spacing:.4em; font-size:1.2rem; font-family:monospace;"
             required autofocus>
      <button type="submit" class="zb-btn-publish w-100">Verify</button>
    </form>
    <div class="zb-login-footer mt-3">
      <a href="{{ url_for('auth.register') }}">← Back to register</a>
    </div>
  </div>
</div>
{% endblock %}
