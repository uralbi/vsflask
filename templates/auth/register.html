{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="zb-login-wrap">
  <div class="zb-login-box" style="max-width:460px;">
    <h5 class="zb-login-title">Create account</h5>
    <form action="{{ url_for('auth.register') }}" method="POST" novalidate>
      <div class="mb-3 text-start">
        <label class="form-label small text-secondary mb-1">Username</label>
        <input type="text" class="zb-input" name="username" placeholder="e.g. john_doe" required autofocus minlength="3" maxlength="64">
      </div>
      <div class="mb-3 text-start">
        <label class="form-label small text-secondary mb-1">Email</label>
        <input type="email" class="zb-input" name="email" placeholder="you@example.com" required>
      </div>
      <div class="mb-3 text-start">
        <label class="form-label small text-secondary mb-1">Password</label>
        <input type="password" class="zb-input" name="password" placeholder="Min. 6 characters" required minlength="6">
      </div>
      <div class="mb-4 text-start">
        <label class="form-label small text-secondary mb-1">Confirm password</label>
        <input type="password" class="zb-input" name="confirm_password" placeholder="Repeat password" required>
      </div>
      <button type="submit" class="zb-btn-publish w-100">Create account</button>
    </form>
    <div class="zb-login-footer mt-3">
      Already have an account? <a href="{{ url_for('home') }}">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
