{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="d-flex flex-column align-items-center mt-5">
  <div class="card auth-card p-4 w-100">

    <h6 class="text-center mb-4 fw-semibold text-secondary text-uppercase" style="letter-spacing:.08em;font-size:.72rem;">Create account</h6>

    <form action="{{ url_for('auth.register') }}" method="POST" novalidate>

      <div class="mb-3">
        <label class="form-label small text-secondary mb-1">Username</label>
        <input type="text" class="form-control form-control-sm" name="username"
               placeholder="e.g. john_doe" required autofocus minlength="3" maxlength="64">
      </div>

      <div class="mb-3">
        <label class="form-label small text-secondary mb-1">Email</label>
        <input type="email" class="form-control form-control-sm" name="email"
               placeholder="you@example.com" required>
      </div>

      <div class="mb-3">
        <label class="form-label small text-secondary mb-1">Password</label>
        <input type="password" class="form-control form-control-sm" name="password"
               placeholder="Min. 6 characters" required minlength="6">
      </div>

      <div class="mb-4">
        <label class="form-label small text-secondary mb-1">Confirm password</label>
        <input type="password" class="form-control form-control-sm" name="confirm_password"
               placeholder="Repeat password" required>
      </div>

      <button type="submit" class="btn btn-dark btn-sm w-100 py-2">Create account</button>
    </form>

    <hr class="my-3" style="opacity:.12;">
    <p class="text-center mb-0" style="font-size:.82rem;">
      Already have an account? <a href="{{ url_for('home') }}" class="text-decoration-none fw-semibold">Sign in</a>
    </p>

  </div>
</div>
{% endblock %}
